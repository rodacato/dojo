sonar.projectKey=dojo
sonar.projectName=dojo
sonar.sourceEncoding=UTF-8

sonar.sources=apps,packages
# Seeds/katas are data-as-code (~16k LOC of scroll/kata content), not logic.
sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/coverage/**,**/.turbo/**,apps/e2e/**,apps/api/src/infrastructure/persistence/seed*.ts,apps/api/src/infrastructure/persistence/katas/**

# Larger TS codebase: give the JS/TS analysis bridge enough Node heap (MB).
sonar.javascript.node.maxspace=4096

# Coverage (Vitest → lcov). Monorepo: one report per package.
sonar.javascript.lcov.reportPaths=apps/api/coverage/lcov.info,apps/web/coverage/lcov.info
