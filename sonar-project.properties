sonar.projectKey=dojo
sonar.projectName=dojo
sonar.sourceEncoding=UTF-8

sonar.sources=apps,packages
sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/coverage/**,**/.turbo/**,apps/e2e/**

# Larger TS codebase: give the JS/TS analysis bridge enough Node heap (MB).
sonar.javascript.node.maxspace=4096

# Coverage (Vitest → lcov). Monorepo: each package writes its own report.
sonar.javascript.lcov.reportPaths=apps/api/coverage/lcov.info
