service: dojo-api
image: <%= ENV["GITHUB_USERNAME"] %>/dojo-api

ssh:
  user: deploy

servers:
  web:
    hosts:
      - <%= ENV["HOST_IP"] %>

proxy:
  ssl: false
  host: <%= ENV["API_URL"].sub(/^https?:\/\//, '') %>
  app_port: 3001
  healthcheck:
    interval: 10
    path: /health
    timeout: 5

registry:
  server: ghcr.io
  username: <%= ENV["GITHUB_USERNAME"] %>
  password:
    - KAMAL_REGISTRY_PASSWORD

env:
  clear:
    NODE_ENV: production
    PORT: '3001'
    WEB_URL: <%= ENV["WEB_URL"] %>
    SENTRY_ENVIRONMENT: <%= ENV["SENTRY_ENVIRONMENT"] %>
    SENTRY_TRACES_SAMPLE_RATE: <%= ENV["SENTRY_TRACES_SAMPLE_RATE"] %>
    SENTRY_RELEASE: <%= ENV["SENTRY_RELEASE"] %>
  secret:
    - DATABASE_URL
    - SESSION_SECRET
    - GITHUB_CLIENT_ID
    - GITHUB_CLIENT_SECRET
    - GITHUB_CALLBACK_URL
    - LLM_ADAPTER_FORMAT
    - LLM_API_KEY
    - LLM_BASE_URL
    - LLM_MODEL
    - LLM_STREAM
    - CREATOR_GITHUB_ID
    - RESEND_API_KEY
    - RESEND_FROM_EMAIL
    - CRON_SECRET
    - FF_CODE_EXECUTION_ENABLED
    - FF_COURSE_NUDGE_ENABLED
    - FF_LLM_PREP_STREAMING_ENABLED
    - FF_PLAYGROUND_ASK_SENSEI_ENABLED
    - FF_PLAYGROUND_CONSOLE_ENABLED
    - PISTON_URL
    - PISTON_HEALTH_URL
    - PLAYGROUND_ASK_SENSEI_DAILY_QUOTA
    - TURNSTILE_SITE_KEY
    - TURNSTILE_SECRET_KEY
    - SENTRY_DSN

builder:
  context: .
  dockerfile: apps/api/Dockerfile
  arch: amd64
  cache:
    type: gha

accessories:
  db:
    image: postgres:16-alpine
    host: <%= ENV["HOST_IP"] %>
    env:
      clear:
        POSTGRES_DB: dojo
        POSTGRES_USER: dojo
      secret:
        - POSTGRES_PASSWORD
    directories:
      - dojo-pgdata:/var/lib/postgresql/data

  piston:
    # Pinned digest: engineer-man/piston is released as :latest only; pinning
    # the digest guards against silent upstream updates breaking prod again.
    image: ghcr.io/engineer-man/piston@sha256:2f66b7456189c4d713aa986d98eccd0b6ee16d26c7ec5f21b30e942756fd127a
    host: <%= ENV["HOST_IP"] %>
    # The image's entrypoint does `cd /sys/fs/cgroup && mkdir isolate/` to
    # build the cgroup subtree for the sandbox. With `cgroupns: host` that
    # subtree lives on the HOST's cgroup tree — not in the container's
    # writable layer — so it survives container teardown. Any next start
    # then fails with `mkdir isolate/: File exists` and Docker enters an
    # infinite restart loop. Wrap the original entrypoint with a small
    # cleanup so reboots are idempotent. Path verified against the image:
    # `docker run --rm --entrypoint cat <image> /piston_api/src/docker-entrypoint.sh`.
    cmd: '-c "rmdir /sys/fs/cgroup/isolate/init 2>/dev/null; rmdir /sys/fs/cgroup/isolate 2>/dev/null; exec /piston_api/src/docker-entrypoint.sh"'
    volumes:
      # Persist installed runtimes so a container recreate doesn't wipe them.
      - dojo-piston-packages:/piston/packages
    options:
      # Piston's isolate sandbox creates cgroup v2 subtrees at /sys/fs/cgroup.
      # Requires privileged + host cgroup namespace — with Docker's default
      # `private` cgroupns the container gets a read-only view of cgroup v2
      # and the entrypoint's `mkdir isolate/` fails EROFS.
      privileged: true
      cgroupns: host
      tmpfs: /piston/jobs:exec,size=256m
      # /bin/sh replaces the image's ENTRYPOINT; cmd above runs the cleanup
      # then exec's the original entrypoint.
      entrypoint: /bin/sh

logging:
  driver: json-file
  options:
    max-size: 50m
    max-file: '3'

aliases:
  shell: app exec --interactive 'sh'
  db: accessory exec db --interactive 'psql -U dojo dojo'
  piston-shell: accessory exec piston --interactive 'sh'
  logs: app logs -f
