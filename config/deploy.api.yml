service: dojo-api
image: <%= ENV["GITHUB_USERNAME"] %>/dojo-api

ssh:
  user: deploy

servers:
  web:
    hosts:
      - <%= ENV["HOST_IP"] %>

proxy:
  ssl: false
  host: <%= ENV["API_URL"].sub(/^https?:\/\//, '') %>
  app_port: 3001
  healthcheck:
    interval: 10
    path: /health
    timeout: 5

registry:
  server: ghcr.io
  username: <%= ENV["GITHUB_USERNAME"] %>
  password:
    - KAMAL_REGISTRY_PASSWORD

env:
  clear:
    NODE_ENV: production
    PORT: '3001'
    WEB_URL: <%= ENV["WEB_URL"] %>
    SENTRY_ENVIRONMENT: <%= ENV["SENTRY_ENVIRONMENT"] %>
    SENTRY_TRACES_SAMPLE_RATE: <%= ENV["SENTRY_TRACES_SAMPLE_RATE"] %>
    SENTRY_RELEASE: <%= ENV["SENTRY_RELEASE"] %>
    METRICS_ENABLED: <%= ENV["METRICS_ENABLED"] %>
  secret:
    - DATABASE_URL
    - SESSION_SECRET
    - GITHUB_CLIENT_ID
    - GITHUB_CLIENT_SECRET
    - GITHUB_CALLBACK_URL
    - LLM_ADAPTER_FORMAT
    - LLM_API_KEY
    - LLM_BASE_URL
    - LLM_MODEL
    - LLM_STREAM
    - CREATOR_GITHUB_ID
    - RESEND_API_KEY
    - RESEND_FROM_EMAIL
    - CRON_SECRET
    - FF_CODE_EXECUTION_ENABLED
    - FF_COURSE_NUDGE_ENABLED
    - FF_LLM_PREP_STREAMING_ENABLED
    - FF_PLAYGROUND_ASK_SENSEI_ENABLED
    - FF_PLAYGROUND_CONSOLE_ENABLED
    - PISTON_URL
    - PISTON_HEALTH_URL
    - PLAYGROUND_ASK_SENSEI_DAILY_QUOTA
    - TURNSTILE_SITE_KEY
    - TURNSTILE_SECRET_KEY
    - SENTRY_DSN
    - METRICS_TOKEN

builder:
  context: .
  dockerfile: apps/api/Dockerfile
  arch: amd64
  cache:
    type: gha

accessories:
  db:
    image: postgres:16-alpine
    host: <%= ENV["HOST_IP"] %>
    env:
      clear:
        POSTGRES_DB: dojo
        POSTGRES_USER: dojo
      secret:
        - POSTGRES_PASSWORD
    directories:
      - dojo-pgdata:/var/lib/postgresql/data

  piston:
    # Pinned digest: engineer-man/piston is released as :latest only; pinning
    # the digest guards against silent upstream updates breaking prod again.
    image: ghcr.io/engineer-man/piston@sha256:2f66b7456189c4d713aa986d98eccd0b6ee16d26c7ec5f21b30e942756fd127a
    host: <%= ENV["HOST_IP"] %>
    # The wrapper does three things in one cmd, in order:
    #   1. Embeds Piston server-side config via `env VAR=val` so the values
    #      reach the node process. Bypass kamal's accessory `env.clear:`
    #      block, which silently failed to apply on `accessory reboot` in our
    #      setup (docker inspect showed env_count = image defaults only).
    #      `su` (used inside the entrypoint) preserves custom env vars across
    #      the user switch — confirmed by hand. Keep aligned with config.ts.
    #
    #      - PISTON_RUN_TIMEOUT / PISTON_COMPILE_TIMEOUT raise the per-request
    #        timeout caps. Defaults of 3000/10000 are too tight for our TS
    #        capstone (~2.7s tsc fixed floor) and any Rust compile of size.
    #      - PISTON_OUTPUT_MAX_SIZE raises the per-stream stdout/stderr cap
    #        from 1024 bytes. Our harness emits `__DOJO_RESULT__ <json>` with
    #        the full per-test array, which routinely exceeds 1KB for >3 tests.
    #        When the default kicks in Piston returns `signal: SIGKILL`,
    #        `status: "OL"`, with stderr "Sandbox keeper received fatal
    #        signal 6" — misleading enough that we spent hours misdiagnosing
    #        it as a kernel / cgroup / sandbox issue. 64KB is generous and
    #        safe; raise further only if a scroll genuinely needs it.
    #   2. Removes the orphan /sys/fs/cgroup/isolate{,/init} cgroup subtrees
    #      left over from any prior container. With `cgroupns: host` the
    #      subtree lives on the HOST's cgroup tree, not in the container's
    #      writable layer, so it survives teardown. Without this cleanup the
    #      image's `mkdir isolate/` in the entrypoint fails EEXIST and Docker
    #      enters an infinite restart loop.
    #   3. Execs the original image entrypoint at the path verified by
    #      `docker run --rm --entrypoint cat <image> /piston_api/src/docker-entrypoint.sh`.
    cmd: '-c "rmdir /sys/fs/cgroup/isolate/init 2>/dev/null; rmdir /sys/fs/cgroup/isolate 2>/dev/null; exec env PISTON_RUN_TIMEOUT=8000 PISTON_COMPILE_TIMEOUT=30000 PISTON_OUTPUT_MAX_SIZE=65536 /piston_api/src/docker-entrypoint.sh"'
    volumes:
      # Persist installed runtimes so a container recreate doesn't wipe them.
      - dojo-piston-packages:/piston/packages
    options:
      # Piston's isolate sandbox creates cgroup v2 subtrees at /sys/fs/cgroup.
      # Requires privileged + host cgroup namespace — with Docker's default
      # `private` cgroupns the container gets a read-only view of cgroup v2
      # and the entrypoint's `mkdir isolate/` fails EROFS.
      privileged: true
      cgroupns: host
      tmpfs: /piston/jobs:exec,size=256m
      # /bin/sh replaces the image's ENTRYPOINT; cmd above runs the cleanup
      # then exec's the original entrypoint.
      entrypoint: /bin/sh

logging:
  driver: json-file
  options:
    max-size: 50m
    max-file: '3'

aliases:
  shell: app exec --interactive 'sh'
  db: accessory exec db --interactive 'psql -U dojo dojo'
  piston-shell: accessory exec piston --interactive 'sh'
  logs: app logs -f
