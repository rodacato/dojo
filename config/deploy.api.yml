service: dojo-api
image: <%= ENV["GITHUB_USERNAME"] %>/dojo-api

ssh:
  user: deploy

servers:
  web:
    hosts:
      - <%= ENV["HOST_IP"] %>

proxy:
  ssl: false
  host: <%= ENV["API_URL"].sub(/^https?:\/\//, '') %>
  app_port: 3001
  healthcheck:
    interval: 10
    path: /health
    timeout: 5

registry:
  server: ghcr.io
  username: <%= ENV["GITHUB_USERNAME"] %>
  password:
    - KAMAL_REGISTRY_PASSWORD

env:
  clear:
    NODE_ENV: production
    PORT: "3001"
    LLM_ADAPTER: anthropic
    WEB_URL: <%= ENV["WEB_URL"] %>
  secret:
    - DATABASE_URL
    - SESSION_SECRET
    - GITHUB_CLIENT_ID
    - GITHUB_CLIENT_SECRET
    - GITHUB_CALLBACK_URL
    - LLM_API_KEY
    - LLM_BASE_URL
    - LLM_MODEL
    - CREATOR_GITHUB_ID
    - RESEND_API_KEY
    - RESEND_FROM_EMAIL

builder:
  context: .
  dockerfile: apps/api/Dockerfile
  arch: amd64
  cache:
    type: gha

accessories:
  db:
    image: postgres:16-alpine
    host: <%= ENV["HOST_IP"] %>
    env:
      clear:
        POSTGRES_DB: dojo
        POSTGRES_USER: dojo
      secret:
        - POSTGRES_PASSWORD
    directories:
      - dojo-pgdata:/var/lib/postgresql/data

logging:
  driver: json-file
  options:
    max-size: 50m
    max-file: "3"

