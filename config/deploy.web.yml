service: dojo-web
image: <%= ENV["GITHUB_USERNAME"] %>/dojo-web

ssh:
  user: deploy

servers:
  web:
    hosts:
      - <%= ENV["HOST_IP"] %>

proxy:
  ssl: false
  host: <%= ENV["WEB_URL"].sub(/^https?:\/\//, '') %>
  app_port: 80
  healthcheck:
    interval: 10
    path: /health
    timeout: 5

registry:
  server: ghcr.io
  username: <%= ENV["GITHUB_USERNAME"] %>
  password:
    - KAMAL_REGISTRY_PASSWORD

builder:
  context: .
  dockerfile: apps/web/Dockerfile
  arch: amd64
  args:
    VITE_API_URL: <%= ENV["API_URL"] %>
  cache:
    type: gha

logging:
  driver: json-file
  options:
    max-size: 10m
    max-file: "3"
