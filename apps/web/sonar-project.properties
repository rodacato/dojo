sonar.projectKey=dojo-web
sonar.projectName=dojo-web
sonar.sourceEncoding=UTF-8

sonar.sources=src
# SonarQube uses Ant globbing — brace alternation `{ts,tsx}` is NOT supported
# and silently matches nothing, so test files leaked into analysis (136 issues
# + dragged new-code coverage to ~0%). List each extension explicitly.
sonar.exclusions=**/node_modules/**,**/dist/**,**/coverage/**,**/*.test.ts,**/*.test.tsx,src/**/__tests__/**,src/test/**,src/main.tsx,src/vite-env.d.ts

sonar.javascript.lcov.reportPaths=coverage/lcov.info

# React + heavy component graph — SonarJS's type-aware bridge needs headroom
# (this workspace was dropped from the scan once for OOM; per-workspace split
# + this ceiling is the mitigation). Bump if the bridge still OOMs in CI.
sonar.javascript.node.maxspace=8192
