server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # React Router — serve index.html for all unknown paths
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Health check endpoint (for Kamal proxy)
  location /health {
    return 200 'ok';
    add_header Content-Type text/plain;
  }

  # Security headers
  add_header X-Frame-Options DENY;
  add_header X-Content-Type-Options nosniff;
  add_header Referrer-Policy strict-origin-when-cross-origin;
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()";
  add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' https://avatars.githubusercontent.com data:; connect-src 'self' https://dojo-api.notdefined.dev wss://dojo-api.notdefined.dev https://*.ingest.us.sentry.io; font-src 'self' data:;";

  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml;
}
