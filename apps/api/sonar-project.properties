sonar.projectKey=dojo-api
sonar.projectName=dojo-api
sonar.sourceEncoding=UTF-8

sonar.sources=src
# seeds/katas are data-as-code (~16k LOC of scroll/kata content), not logic.
sonar.exclusions=**/node_modules/**,**/dist/**,**/coverage/**,**/*.test.ts,src/test/**,src/infrastructure/persistence/seed*.ts,src/infrastructure/persistence/katas/**

# Coverage measured on business logic only — mirror vitest.config's coverage
# exclude (dev CLIs, entry/glue, drizzle data + migrations). These have no
# unit-test value and only drag the denominator; they're still analyzed for issues.
sonar.coverage.exclusions=src/index.ts,src/config.ts,src/infrastructure/container.ts,src/scripts/**,src/infrastructure/persistence/drizzle/**,src/infrastructure/persistence/migrate.ts,src/infrastructure/persistence/seed*.ts

sonar.javascript.lcov.reportPaths=coverage/lcov.info

# drizzle/zod types are heavy for SonarJS's type-aware bridge — give it headroom.
sonar.javascript.node.maxspace=8192
