name: Deploy

on:
  push:
    branches: [production]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  deploy-api:
    name: Deploy API
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 20
    env:
      KAMAL_REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
      GITHUB_USERNAME: ${{ github.repository_owner }}
      HOST_IP: ${{ vars.HOST_IP }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
      OAUTH_CLIENT_ID: ${{ vars.OAUTH_CLIENT_ID }}
      OAUTH_CLIENT_SECRET: ${{ secrets.OAUTH_CLIENT_SECRET }}
      OAUTH_CALLBACK_URL: ${{ vars.OAUTH_CALLBACK_URL }}
      LLM_ADAPTER_FORMAT: ${{ vars.LLM_ADAPTER_FORMAT }}
      LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
      LLM_BASE_URL: ${{ vars.LLM_BASE_URL }}
      LLM_MODEL: ${{ vars.LLM_MODEL }}
      LLM_STREAM: ${{ vars.LLM_STREAM }}
      WEB_URL: ${{ vars.WEB_URL }}
      API_URL: ${{ vars.API_URL }}
      CREATOR_GITHUB_ID: ${{ secrets.CREATOR_GITHUB_ID }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      RESEND_FROM_EMAIL: ${{ vars.RESEND_FROM_EMAIL }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      FF_CODE_EXECUTION_ENABLED: ${{ vars.FF_CODE_EXECUTION_ENABLED }}
      PISTON_URL: ${{ vars.PISTON_URL }}
      SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
      SENTRY_ENVIRONMENT: ${{ vars.SENTRY_ENVIRONMENT || 'production' }}
      SENTRY_TRACES_SAMPLE_RATE: ${{ vars.SENTRY_TRACES_SAMPLE_RATE || '0' }}
      SENTRY_RELEASE: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby (for Kamal)
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'

      - name: Install Kamal
        run: gem install kamal -v '~> 2.0'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add VPS to known hosts
        run: ssh-keyscan ${{ vars.HOST_IP }} >> ~/.ssh/known_hosts

      - name: Boot accessories
        run: kamal accessory boot all --config-file config/deploy.api.yml 2>/dev/null || true

      - name: Setup or deploy API
        run: |
          if kamal app details --config-file config/deploy.api.yml 2>/dev/null; then
            kamal deploy --config-file config/deploy.api.yml
          else
            kamal setup --config-file config/deploy.api.yml
          fi

  deploy-web:
    name: Deploy web
    needs: deploy-api
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 10
    env:
      KAMAL_REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
      GITHUB_USERNAME: ${{ github.repository_owner }}
      HOST_IP: ${{ vars.HOST_IP }}
      WEB_URL: ${{ vars.WEB_URL }}
      API_URL: ${{ vars.API_URL }}
      VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
      VITE_SENTRY_ENVIRONMENT: ${{ vars.VITE_SENTRY_ENVIRONMENT || 'production' }}
      VITE_SENTRY_RELEASE: ${{ github.sha }}
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      SENTRY_ORG: ${{ vars.SENTRY_ORG }}
      SENTRY_PROJECT: ${{ vars.SENTRY_PROJECT || 'dojo-web' }}
      SENTRY_ENVIRONMENT: ${{ vars.SENTRY_ENVIRONMENT || 'production' }}
      SENTRY_TRACES_SAMPLE_RATE: ${{ vars.SENTRY_TRACES_SAMPLE_RATE || '0' }}
      SENTRY_RELEASE: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby (for Kamal)
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'

      - name: Install Kamal
        run: gem install kamal -v '~> 2.0'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add VPS to known hosts
        run: ssh-keyscan ${{ vars.HOST_IP }} >> ~/.ssh/known_hosts

      - name: Setup or deploy web
        run: |
          if kamal app details --config-file config/deploy.web.yml 2>/dev/null; then
            kamal deploy --config-file config/deploy.web.yml
          else
            kamal setup --config-file config/deploy.web.yml
          fi
