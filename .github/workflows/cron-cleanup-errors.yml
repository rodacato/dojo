name: Cron — Cleanup Errors

# Daily housekeeping: deletes rows in the `errors` table older than
# 30 days via POST /cron/cleanup-errors. Same auth pattern as
# /cron/reminders — bearer token against CRON_SECRET. See
# docs/specs/027-sprint-022-playground.md §2 and the runbook
# note in README.

on:
  schedule:
    # 03:07 UTC daily — avoids exact-hour traffic and any bursty
    # neighboring workflows.
    - cron: '7 3 * * *'
  workflow_dispatch:

jobs:
  cleanup:
    name: Cleanup errors table
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: POST /cron/cleanup-errors
        env:
          CRON_API_URL: ${{ secrets.CRON_API_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -euo pipefail
          response=$(mktemp)
          status=$(curl -sS -o "$response" -w '%{http_code}' \
            -X POST "${CRON_API_URL}/cron/cleanup-errors" \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            -H "Content-Type: application/json")
          echo "HTTP ${status}"
          cat "$response"
          echo ""
          if [ "$status" != "200" ]; then
            echo "Cron call failed with status ${status}"
            exit 1
          fi
