# Standardized quality + security gate — calls rodacato/sector-7g.
# Update the reusable workflows there → this repo inherits the change.
name: Sector 7g - Quality

on:
  workflow_dispatch:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

jobs:
  security:
    uses: rodacato/sector-7g/.github/workflows/security.yml@master
    with:
      blocking: false # report-only for now; flip to true (or remove) to enforce

  sonar:
    # Manual-only for now: runs on "Run workflow", not on every push/PR.
    # Monorepo → one Sonar project per workspace (own bridge = lower memory).
    # Each app has its own sonar-project.properties; scanned via project_base_dir.
    # Vitest thresholds are neutralized (VITEST_NO_COVERAGE_THRESHOLD) so a low
    # number still feeds Sonar; gating stays in CI's test job.
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0 # full history → accurate "new code" / blame dates

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9.15.4 # must match packageManager in root package.json

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run api tests with coverage
        run: pnpm --filter=@dojo/api test:coverage
        env:
          VITEST_NO_COVERAGE_THRESHOLD: "1" # report coverage, don't gate on it
          DATABASE_URL: postgresql://dojo:dojo@localhost:5432/dojo_test
          SESSION_SECRET: ci-test-secret-minimum-32-characters-long
          GITHUB_CLIENT_ID: ci-test-client-id
          GITHUB_CLIENT_SECRET: ci-test-client-secret
          GITHUB_CALLBACK_URL: http://localhost:3001/auth/github/callback
          LLM_ADAPTER_FORMAT: mock
          LLM_BASE_URL: http://localhost:11434
          LLM_API_KEY: ci-test-api-key
          WEB_URL: http://localhost:5173
          NODE_ENV: test

      - name: Run web tests with coverage
        run: pnpm --filter=@dojo/web test:coverage

      - name: Run shared tests with coverage
        run: pnpm --filter=@dojo/shared test:coverage

      # One Sonar project per workspace. web's react type graph is the OOM risk
      # that once got it dropped — mitigated by the per-workspace bridge +
      # maxspace ceiling in its sonar-project.properties; bump that if it OOMs.
      - name: Scan api
        uses: rodacato/sector-7g/actions/sonar-scan@master
        with:
          host_url: ${{ vars.SONAR_HOST_URL }}
          token: ${{ secrets.SONAR_TOKEN }}
          project_base_dir: apps/api

      - name: Scan web
        uses: rodacato/sector-7g/actions/sonar-scan@master
        with:
          host_url: ${{ vars.SONAR_HOST_URL }}
          token: ${{ secrets.SONAR_TOKEN }}
          project_base_dir: apps/web

      - name: Scan shared
        uses: rodacato/sector-7g/actions/sonar-scan@master
        with:
          host_url: ${{ vars.SONAR_HOST_URL }}
          token: ${{ secrets.SONAR_TOKEN }}
          project_base_dir: packages/shared
